# Target overworld. If this world does not exist or is not NORMAL, the first NORMAL world is used.
world-name: world

holograms:
  vertical-offset: 2.0
  interaction-width: 2.75
  interaction-height: 3.0

border:
  particle-interval-ticks: 20
  particle-view-distance-chunks: 3
  particle-spacing-blocks: 1
  particle-height-blocks: 4
  particle-size: 1.25

requirements:
  # 0 means the plugin will create and persist a random seed in data.yml.
  random-seed: 0
  # Chunks close to the initial chunk should stay very accessible.
  start-area:
    max-distance: 2
    material: DIRT
    min-amount: 4
    max-amount: 12
  blocked-materials:
    - AIR
    - CAVE_AIR
    - VOID_AIR
    - BEDROCK
    - BARRIER
    - LIGHT
    - COMMAND_BLOCK
    - CHAIN_COMMAND_BLOCK
    - REPEATING_COMMAND_BLOCK
    - STRUCTURE_BLOCK
    - STRUCTURE_VOID
    - JIGSAW
    - DEBUG_STICK
    - END_PORTAL_FRAME
    - END_PORTAL
    - NETHER_PORTAL
    - DRAGON_EGG
    - SPAWNER
    - TRIAL_SPAWNER
    - VAULT
    - REINFORCED_DEEPSLATE
  tiers:
    early:
      max-distance: 2
      min-amount: 4
      max-amount: 12
      materials:
        - DIRT
        - COBBLESTONE
        - OAK_LOG
        - SPRUCE_LOG
        - BIRCH_LOG
        - STICK
        - WHEAT_SEEDS
        - SAND
        - GRAVEL
    basic:
      max-distance: 5
      min-amount: 8
      max-amount: 24
      materials:
        - COBBLESTONE
        - STONE
        - OAK_PLANKS
        - SPRUCE_PLANKS
        - BIRCH_PLANKS
        - COAL
        - RAW_COPPER
        - RAW_IRON
        - GLASS
        - TORCH
        - BREAD
    mid:
      max-distance: 10
      min-amount: 12
      max-amount: 40
      materials:
        - IRON_INGOT
        - COPPER_INGOT
        - REDSTONE
        - LAPIS_LAZULI
        - LEATHER
        - STRING
        - BONE
        - GUNPOWDER
        - CLAY_BALL
        - BRICK
    late:
      max-distance: 2147483647
      min-amount: 16
      max-amount: 64
      materials:
        - GOLD_INGOT
        - DIAMOND
        - EMERALD
        - OBSIDIAN
        - AMETHYST_SHARD
        - QUARTZ
        - ENDER_PEARL
